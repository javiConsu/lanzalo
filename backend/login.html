<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accede a Lanzalo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #111;
            color: #fff;
        }
        .card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #fff; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            box-sizing: border-box;
            background: #2d2d44;
            border: 1px solid #4a4a6a;
            color: #fff;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover { background: #357abd; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: #4a1a1a;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 5px;
            margin: 15px 0;
            display: none;
        }
        .success {
            background: #1a4a1a;
            color: #6bff6b;
            padding: 12px;
            border-radius: 5px;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Lanzalo</h1>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <input type="email" id="email" placeholder="Tu email" value="javi@saleshackers.es" required>
        <button onclick="sendLink()" id="btn">Enviar enlace mágico</button>

        <p style="font-size: 12px; color: #888; margin-top: 30px;">
            Seleccionaremos un email válido (2026-03-07@gmail.com si te lo pedí antes).
        </p>
    </div>

    <script>
        async function sendLink() {
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            const btn = document.getElementById('btn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                // Usar el backend directamente, NO Vercel
                const response = await fetch('/api/login/send-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers.get('content-type'));

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = '✅ Email enviado! Revisa tu bandeja de entrada.\n\nSi no lo ves en 5 minutos, puedes reintentar.';
                    successDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reneviar enlace';
                } else {
                    errorDiv.textContent = '❌ Error: ' + (data.error || 'No se pudo enviar el email');
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Enviar enlace mágico';
                }
            } catch (e) {
                errorDiv.textContent = '❌ Error de conexión: ' + e.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Enviar enlace mágico';
            }
        }
    </script>
</body>
</html>
