<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #111; color: #fff; }
        .box { background: #222; padding: 30px; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        input { background: #333; border: 1px solid #555; color: #fff; }
        button { background: #2563eb; border: none; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #1d4ed8; }
        #result { margin-top: 30px; padding: 20px; background: #222; border-radius: 5px; white-space: pre-wrap; }
        .error { background: #7f1d1d; color: #fca5a5; }
        .success { background: #14532d; color: #86efac; }
        .token { word-break: break-all; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Login Test</h1>
        <input type="email" id="email" value="javi@saleshackers.es">
        <input type="password" id="password" value="Lanzalo2026!">
        <button onclick="login()">Entrar</button>
        <div id="result"></div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            result.textContent = 'Cargando...';
            result.className = 'result';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    result.innerHTML = '<div class="success">✅ EXITO\n\n' + JSON.stringify(data, null, 2) + '</div>';
                } else {
                    result.innerHTML = '<div class="error">❌ ERROR\n\n' + JSON.stringify(data, null, 2) + '</div>';
                }
            } catch (e) {
                result.innerHTML = '<div class="error">❌ ERROR: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
