<!DOCTYPE html>
<html>
<head>
    <title>Lanzalo Login Test</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .form-group {
            margin: 20px 0;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        input {
            background: #2d2d44;
            border: 1px solid #4a4a6a;
            color: #fff;
        }
        button {
            background: #4a90e2;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #357abd;
        }
        .result {
            margin-top: 30px;
            padding: 15px;
            background: #2d2d44;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .error {
            background: #4a1a1a;
            color: #ff6b6b;
        }
        .success {
            background: #1a4a1a;
            color: #6bff6b;
        }
        .token {
            word-break: break-all;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <h1>🚀 Lanzalo Login Test</h1>

    <div class="form-group">
        <input type="email" id="email" value="javi@saleshackers.es" placeholder="Email">
    </div>

    <div class="form-group">
        <input type="password" id="password" value="Lanzalo2026!" placeholder="Password">
    </div>

    <button onclick="login()">Entrar</button>

    <div id="result" class="result"></div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = 'Cargando...';
            resultDiv.className = 'result';

            try {
                const response = await fetch('https://lanzalo-production.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ LOGIN EXITOSO!

                            Status: ${response.status} ${response.statusText}

                            User:
                            ${JSON.stringify(data.user, null, 2)}

                            Token:
                            <div class="token">${data.token}</div>
                        </div>
                    `;
                    console.log('Login successful:', data);
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            ❌ ERROR

                            Status: ${response.status} ${response.statusText}

                            ${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                    console.error('Login failed:', data);
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ ERROR DE CONEXIÓN

                        ${error.message}
                    </div>
                `;
                console.error('Network error:', error);
            }
        }
    </script>
</body>
</html>
