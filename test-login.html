<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #111;
            color: #fff;
        }
        .success {
            background: #1a4a1a;
            color: #6bff6b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        .error {
            background: #4a1a1a;
            color: #ff6b6b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        button {
            padding: 15px 30px;
            background: #4a90e2;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🚀 Test Login Endpoint</h1>

    <button onclick="test()">Test Endpoint</button>

    <div id="result"></div>

    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Cargando...';

            try {
                const response = await fetch('https://lanzalo-production.up.railway.app/api/auth/test-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@test.com' })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">✅ EXITO!\n\n' + JSON.stringify(data, null, 2) + '</div>';
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ ERROR\n\n' + JSON.stringify(data, null, 2) + '</div>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="error">❌ Error de conexión: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
