<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login Simple Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #111;
            color: #fff;
        }
        .card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .success {
            background: #1a4a1a;
            color: #6bff6b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        .error {
            background: #4a1a1a;
            color: #ff6b6b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        button {
            padding: 15px 30px;
            background: #4a90e2;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Lanzalo - TEST SIMPLE</h1>
        <div id="result"></div>

        <button onclick="test()">TEST BACKEND</button>

        <p style="font-size: 12px; color: #888; margin-top: 30px;">
            Si ves verde arriba = Backend ONLINE<br>
            Si ves rojo arriba = Backend CRASHIADO<br>
        </p>
    </div>

    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                console.log('Testing...');

                const response = await fetch('/api/simple-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@test.com' })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">✅ EXITO!\n\nBackend está ONLINE\n\n' + JSON.stringify(data, null, 2) + '</div>';
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ ERROR\n\n' + JSON.stringify(data, null, 2) + '</div>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="error">❌ ERROR DE CONEXIÓN\n\n' + e.message + '\n\nEl backend no está respondiendo.</div>';
            }
        }
    </script>
</body>
</html>
