<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanzalo — Tu Co-Fundador IA autonomo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-2xl font-bold">🚀 Lanzalo</div>
            <button id="header-logout" onclick="doLogout()" class="hidden text-sm text-gray-400 hover:text-white transition-colors">Cerrar sesion</button>
        </div>
    </header>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <section class="max-w-4xl mx-auto px-6 py-20 text-center">
            <h1 class="text-5xl md:text-6xl font-bold mb-6 leading-tight">
                Tu equipo de IA autonomo<br>
                <span class="text-blue-400">que trabaja contigo</span>
            </h1>
            <p class="text-xl text-gray-400 mb-12 max-w-2xl mx-auto">
                7 agentes especializados construyen y venden tu negocio<br>
                mientras tu decides que hacer despues
            </p>

            <!-- Login Form -->
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-8 mb-6 max-w-md mx-auto">
                <div class="flex gap-2 mb-6">
                    <button id="tab-login" onclick="switchMode('login')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-blue-600 text-white">Iniciar sesion</button>
                    <button id="tab-register" onclick="switchMode('register')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-700 text-gray-400">Crear cuenta</button>
                </div>

                <div id="error-msg" class="hidden bg-red-900/50 border border-red-700 text-red-300 px-4 py-2 rounded-lg mb-4 text-sm"></div>
                <div id="success-msg" class="hidden bg-green-900/50 border border-green-700 text-green-300 px-4 py-2 rounded-lg mb-4 text-sm"></div>

                <input type="email" id="email" placeholder="Tu email" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-3">
                <input type="password" id="password" placeholder="Contrasena (minimo 8 caracteres)" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">

                <button id="btn" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors">Entrar</button>

                <div class="my-4 flex items-center gap-3">
                    <div class="flex-1 h-px bg-gray-600"></div>
                    <span class="text-gray-500 text-sm">O</span>
                    <div class="flex-1 h-px bg-gray-600"></div>
                </div>

                <button id="magic-btn" onclick="sendMagicLink()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 font-medium py-3 rounded-lg transition-colors text-sm">
                    🔮 Enviar enlace magico por email
                </button>
            </div>
        </section>
    </div>

    <!-- DASHBOARD VIEW (after login) -->
    <div id="dashboard-view" class="hidden">
        <section class="max-w-4xl mx-auto px-6 py-20 text-center fade-in">
            <div class="text-6xl mb-6">🚀</div>
            <h1 class="text-4xl font-bold mb-4">Bienvenido a Lanzalo</h1>
            <p class="text-xl text-gray-400 mb-2" id="welcome-email"></p>
            <p class="text-gray-500 mb-8">Tu sesion esta activa. Los agentes estan trabajando.</p>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-8 max-w-lg mx-auto">
                <h2 class="text-xl font-bold mb-4">Estado del sistema</h2>
                <div class="space-y-3 text-left">
                    <div class="flex justify-between"><span class="text-gray-400">Agentes activos</span><span class="text-green-400">7/7 ✅</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Plan</span><span id="user-plan" class="text-blue-400">Free</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Token</span><span class="text-green-400">Valido ✅</span></div>
                </div>
            </div>
            <button onclick="doLogout()" class="mt-8 text-gray-500 hover:text-white transition-colors text-sm">Cerrar sesion</button>
        </section>
    </div>

    <script>
    var BACKEND_URL = 'https://lanzalo-production.up.railway.app';
    var currentMode = 'login';

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('tab-login').className = mode === 'login'
            ? 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-blue-600 text-white'
            : 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-700 text-gray-400 hover:bg-gray-600';
        document.getElementById('tab-register').className = mode === 'register'
            ? 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-blue-600 text-white'
            : 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-700 text-gray-400 hover:bg-gray-600';
        document.getElementById('btn').textContent = mode === 'login' ? 'Entrar' : 'Crear cuenta gratis';
        hideMessages();
    }

    function hideMessages() {
        document.getElementById('error-msg').classList.add('hidden');
        document.getElementById('success-msg').classList.add('hidden');
    }

    function showError(msg) {
        var el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function showSuccess(msg) {
        var el = document.getElementById('success-msg');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    async function handleAuth() {
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var btn = document.getElementById('btn');
        hideMessages();

        if (!email || !password) { showError('Completa todos los campos'); return; }
        if (password.length < 8) { showError('La contrasena debe tener al menos 8 caracteres'); return; }

        btn.disabled = true;
        btn.textContent = 'Cargando...';

        try {
            var endpoint = currentMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            var res = await fetch(BACKEND_URL + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password, name: email.split('@')[0] })
            });
            var data = await res.json();

            if (res.ok && data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showDashboard(data.user);
            } else if (currentMode === 'register' && res.ok) {
                showSuccess('Cuenta creada. Inicia sesion.');
                switchMode('login');
            } else if (data.error && data.error.includes('ya registrado')) {
                switchMode('login');
                showError('Ya tienes cuenta. Inicia sesion.');
            } else {
                showError(data.error || 'Error. Intenta de nuevo.');
            }
        } catch (err) {
            console.error('Error:', err);
            showError('Error de conexion. Verifica tu internet.');
        } finally {
            btn.disabled = false;
            btn.textContent = currentMode === 'login' ? 'Entrar' : 'Crear cuenta gratis';
        }
    }

    async function sendMagicLink() {
        var email = document.getElementById('email').value;
        var btn = document.getElementById('magic-btn');
        hideMessages();

        if (!email || !email.includes('@')) { showError('Introduce un email valido'); return; }

        btn.disabled = true;
        btn.textContent = 'Enviando...';

        try {
            var res = await fetch(BACKEND_URL + '/api/minimal-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            var data = await res.json();

            if (res.ok && data.success) {
                showSuccess('Enlace enviado! Revisa tu email (puede tardar 1-2 min).');
            } else {
                showError(data.error || 'Error enviando enlace.');
            }
        } catch (err) {
            console.error('Error:', err);
            showError('Error de conexion.');
        } finally {
            btn.disabled = false;
            btn.textContent = '🔮 Enviar enlace magico por email';
        }
    }

    function showDashboard(user) {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('hidden');
        document.getElementById('header-logout').classList.remove('hidden');
        document.getElementById('welcome-email').textContent = user ? user.email : '';
        if (user && user.plan) document.getElementById('user-plan').textContent = user.plan;
    }

    function doLogout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('header-logout').classList.add('hidden');
    }

    // Check if already logged in
    (function() {
        var token = localStorage.getItem('token');
        if (token) {
            fetch(BACKEND_URL + '/api/auth/verify', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'ok') {
                    showDashboard(data.user);
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            })
            .catch(function() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            });
        }
    })();
    </script>
</body>
</html>
